name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest --cov=cv_generator --cov-report=term-missing -m "not e2e" --ignore=tests/e2e

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,e2e]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        run: pytest tests/e2e -m e2e -v
